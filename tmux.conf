##########################################
# Initialize basic settings
##########################################
run-shell "tmux source-file \"\$HOME/.dotfiles/config/tmux/defaults.conf\""

##########################################
# Initialize TMUX powerline
##########################################
# If powerline-config is unavailable, fall back to the repo's basic status bar.
run-shell "if ! command -v powerline-config >/dev/null 2>&1; then tmux source-file \"\$HOME/.dotfiles/config/tmux/basic.conf\"; fi"

# Start the daemon when powerline support is available.
run-shell "if command -v powerline-config >/dev/null 2>&1; then command -v powerline-daemon >/dev/null 2>&1 && powerline-daemon -q; fi"

# Use powerline's tmux bootstrap when available; if setup fails, fall back.
run-shell "if command -v powerline-config >/dev/null 2>&1; then powerline-config tmux setup || tmux source-file \"\$HOME/.dotfiles/config/tmux/basic.conf\"; fi"

##########################################
# Loading external config files
##########################################
# Version-specific configuration can be placed in ~/.tmux/${TMUX_VERSION}/*.conf
run-shell "[ -d ~/.tmux/$(tmux -V | cut -d' ' -f2)/ ] && for conf in ~/.tmux/$(tmux -V | cut -d' ' -f2)/*.conf; do tmux source-file \"\$conf\"; done"
# Version-specific configuration can be placed in ~/.tmux/${TMUX_VERSION}/*.conf
run-shell "[ -d ~/.tmux/ ] && for conf in ~/.tmux/*.conf; do tmux source-file \"\$conf\"; done"

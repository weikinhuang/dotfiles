[user]
  # name = $GIT_AUTHOR_NAME or override with ~/.gitconfig.local
  name =
  # email = $GIT_AUTHOR_EMAIL or override with ~/.gitconfig.local
  email =

[github]
  # Set apitoken via $GIT_HUB_API_TOKEN or override with ~/.gitconfig.local
  apitoken =

[color]
  ui = auto

[advice]
  pushNonFastForward = false
  statusHints = false

[core]
  whitespace = fix,trailing-space,space-before-tab
  autocrlf = input
  filemode = false
  pager = less -x1,5 -iFXRS
  # editor = $EDITOR
  excludesfile = ~/.dotfiles/config/git/global.gitignore
  # Improves status performance on large repos.
  # Note: sandboxed environments may log IPC "Operation not permitted" warnings.
  fsmonitor = true
  untrackedCache = true

[pager]
  # overridden by plugins/30-delta.sh when delta is installed, falling back to
  # git-diff-highlight for word-level change highlighting
  log = git-diff-highlight | less -x1,5 -iFXRS
  show = git-diff-highlight | less -x1,5 -iFXRS
  diff = git-diff-highlight | less -x1,5 -iFXRS

[apply]
  whitespace = nowarn

[branch]
  autosetupmerge = true
  sort = -committerdate

[pull]
  ff = only

[push]
  default = simple
  followTags = true
  autoSetupRemote = true

[fetch]
  prune = true
  pruneTags = true
  fsckobjects = true

[transfer]
  fsckobjects = true

[receive]
  fsckObjects = true

[rerere]
  enabled = true
  autoupdate = true

[commit]
  verbose = true

[tag]
  sort = version:refname

[diff]
  renames = copies
  mnemonicprefix = true
  colorMoved = plain
  tool = auto-difftool
  algorithm = histogram
  # Enable an experimental heuristic that shifts the hunk boundary in an
  # attempt to make the resulting patch easier to read.
  indentHeuristic = true

[rebase]
  autostash = true
  autoSquash = true

[merge]
  stat = true
  conflictstyle = zdiff3
  tool = auto-mergetool

[difftool]
  prompt = false

[mergetool]
  prompt = false

[difftool "auto-difftool"]
  cmd = git-auto-difftool $LOCAL $REMOTE

[mergetool "auto-mergetool"]
  cmd = git-auto-mergetool $BASE $LOCAL $REMOTE $MERGED

[help]
  autocorrect = prompt

[init]
	defaultBranch = main

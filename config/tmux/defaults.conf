
##########################################
# STATUS BAR
##########################################
set -g status-keys vi
set -g status-interval 1

##########################################
# Terminal options
##########################################
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"
set -as terminal-features ",screen-256color:RGB"
set -as terminal-features ",tmux-256color:RGB"
set -as terminal-overrides ",*:Smulx=\E[4::%p1%dm"
set -as terminal-overrides ",*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m"

##########################################
# TERMINAL EMULATOR TITLES
set-option -g set-titles on
set-option -g set-titles-string "#S | #T"
set-option -g automatic-rename on

##########################################
# KEY BINDINGS
##########################################
# C-a = prefix
unbind C-b
set -g prefix C-a

# C-a = last-window
unbind l
bind C-a last-window

# C-a = new-window
bind C-n new-window

# Esc = copy-mode
unbind [
bind Escape copy-mode

# | = horizontal split (preserve current path)
unbind %
bind | split-window -h -c "#{pane_current_path}"

# - = vertical split (preserve current path)
unbind '"'
bind - split-window -v -c "#{pane_current_path}"

# " = choose-window
bind '"' choose-window

# r = respawn after exit or disconnect (zombie)
bind C-r respawn-window

# k = kill after exit or disconnect (zombie)
bind C-k kill-window

##########################################
# BASIC CONFIG
##########################################
# vi Style Editing
setw -g mode-keys vi

# Make mouse useful in copy mode
setw -g mouse on

# Allow xterm titles in terminal window, terminal scrolling with scrollbar, and setting overrides of C-Up, C-Down, C-Left, C-Right
# set -g terminal-overrides "xterm*:XT:smcup@:rmcup@:kUP5=\eOA:kDN5=\eOB:kLFT5=\eOD:kRIT5=\eOC"

# Scroll History
set -g history-limit 50000

# Set ability to capture on start and restore on exit window data when running an application
setw -g alternate-screen on
setw -g allow-passthrough on

# Eliminate escape delay for immediate response (critical for vim/neovim)
set -s escape-time 0

# Start window and pane numbering at 1 for ergonomic switching
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows sequentially when one is closed
set -g renumber-windows on

# Enable focus events for vim autoread support inside tmux
set -g focus-events on

# Enable OSC 52 clipboard integration
set -g set-clipboard on

##########################################
# Env
##########################################
# reload env variables on re-login
set-option -g update-environment "\
    DISPLAY \
    SSH_ASKPASS \
    SSH_AUTH_SOCK \
    SSH_AGENT_PID \
    SSH_CONNECTION \
    WINDOWID \
    XAUTHORITY \
"

# Kaomoji avatar set - the committed default for the `avatar` extension.
#
# Parsed by lib/node/pi/avatar/ascii-yaml.ts (a tiny purpose-built reader, not
# a full YAML engine). Only three shapes are understood:
#   state: "frame"              a single frame
#   state:                      named frames (first = base, second = blink/swap)
#     default: "frame"
#     blink:   "frame"
#   state:                      an ordered list of frames (cycled while active)
#     - "frame a"
#     - "frame b"
#
# Activity states are driven automatically by agent lifecycle events. Every
# other key is an "emotion" the model can trigger inline with [emote:NAME].
# Keep each face roughly <= 9 columns wide so it sits inside the avatar cell.

# ── Activity states ──────────────────────────────────────────────────────────


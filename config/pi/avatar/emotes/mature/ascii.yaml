# Opt-in "mature" kaomoji overlay for the `avatar` extension.
#
# These keys LAYER ON TOP OF the shared default set (config/pi/avatar/emotes/
# ascii/ascii.yaml) - they only add the emotes below, every default emote still
# works. The overlay is active only when a model is mapped to the `mature` set,
# so it never leaks into ordinary coding sessions. Enable it in your avatar
# config, e.g.:
#
#   { "emotes": [ { "model": "*", "emote-set": "mature" } ] }
#
# Content note: kaomoji are text-only facial expressions, so every entry here is
# strictly SFW as rendered. They give the model a richer intimate-roleplay
# vocabulary (desire, physical reaction, intensity, consensual dynamics,
# vulnerability, aftercare) for opt-in adult scenes. Parsed by
# lib/node/pi/avatar/ascii-yaml.ts; keep each face <= ~9 columns wide.

